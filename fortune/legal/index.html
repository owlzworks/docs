  <style>
:root { color-scheme: light dark; --brand: #6C5CE7; --accent: #00C2A8;
  --bg:#F7F6FB; --fg:#1C1B1F; --muted:#6B6B72; --card:#FFFFFF; --line:#E7E4F0; }
@media (prefers-color-scheme: dark) {
  :root { --bg:#121019; --fg:#E9E5F2; --muted:#A8A2B8; --card:#1B1827; --line:#2A2640; }
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body { margin:0; background:var(--bg); color:var(--fg); line-height:1.7;
  font-family:-apple-system,BlinkMacSystemFont,"Plus Jakarta Sans","Segoe UI",Roboto,
  "Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
.wrap { max-width:720px; margin:0 auto; padding:24px 20px 64px; }
header.brand { display:flex; align-items:center; gap:10px; color:var(--brand); padding:8px 0 4px; }
header.brand .name { font-size:22px; font-weight:800; letter-spacing:-.3px; color:var(--fg); }
nav.bar { display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 8px; }
nav.bar a { font-size:13px; text-decoration:none; color:var(--brand);
  border:1px solid var(--line); border-radius:999px; padding:6px 13px; background:var(--card); }
nav.bar a.active { background:var(--brand); color:#fff; border-color:var(--brand); }
nav.bar .spacer { flex:1; }
h1 { font-size:26px; margin:18px 0 4px; letter-spacing:-.4px; }
.muted { color:var(--muted); font-size:13px; margin:0 0 18px; }
.lead { font-size:16px; background:var(--card); border:1px solid var(--line);
  border-radius:14px; padding:14px 16px; }
h2 { font-size:18px; margin:30px 0 6px; }
p, li { font-size:15px; }
a { color:var(--brand); }
footer { margin-top:40px; padding-top:18px; border-top:1px solid var(--line);
  color:var(--muted); font-size:13px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px; }
@media (max-width:520px) { .grid { grid-template-columns:1fr; } }
.card { display:block; text-decoration:none; color:var(--fg); background:var(--card);
  border:1px solid var(--line); border-radius:16px; padding:18px; }
.card:hover { border-color:var(--brand); }
.card .t { font-weight:700; font-size:16px; }
.card .s { color:var(--muted); font-size:13px; margin-top:4px; }
.hero { background:linear-gradient(135deg,#6C5CE7,#00C2A8); color:#fff;
  border-radius:20px; padding:26px 22px; margin-top:14px; }
.hero .name { font-size:26px; font-weight:800; }
.hero p { margin:6px 0 0; opacity:.95; }
.pill { display:inline-block; background:rgba(255,255,255,.18); border-radius:999px;
  padding:3px 10px; font-size:12px; margin-top:12px; }
</style>
</head>
